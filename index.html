<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>EC Sales / Events Calendar 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#1A1A1A;--gold:#F5A623;--gold-light:#FFF8ED;
  --red:#CC0000;--orange:#E65100;--green:#1E7D34;
  --bg:#F0F2F5;--surface:#fff;--border:#E4E7EE;
  --text:#16181D;--muted:#6B7280;--radius:14px;
  --shadow:0 1px 6px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.05);
  --nav-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(var(--nav-h) + 8px)}

/* HEADER */
.hdr{background:var(--brand);position:sticky;top:0;z-index:300;box-shadow:0 2px 16px rgba(0,0,0,.4)}
.hdr-inner{max-width:960px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px}
.logo img{height:26px;display:block;flex-shrink:0}
.hdr-title{flex:1;min-width:0}
.hdr-title h1{color:#fff;font-size:13px;font-weight:600}
.hdr-title p{color:var(--gold);font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.edit-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:7px 12px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.edit-btn:hover{background:rgba(255,255,255,.18)}
.edit-btn.on{background:var(--gold);color:var(--brand);border-color:var(--gold)}

/* Sync status pill */
.sync{font-size:10px;color:var(--muted);text-align:center;padding:6px 0 0}
.sync.err{color:var(--red)}
.sync.ok{color:var(--green)}

/* TAB NAV */
.tab-bar{background:var(--brand);border-top:1px solid #2a2a2a;display:flex}
.tab-btn{flex:1;padding:0 2px 10px;border:none;background:none;cursor:pointer;color:#666;font-family:'DM Sans',sans-serif;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;border-bottom:2px solid transparent}
.tab-btn .ti{font-size:17px}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* PAGES */
.page{display:none;max-width:960px;margin:0 auto;padding:14px 12px}
.page.active{display:block}

/* Loading */
.loading{text-align:center;padding:50px 20px;color:var(--muted)}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAGE 1 — CAMPAIGN DIRECTORY */
.dir-search-wrap{position:sticky;top:88px;z-index:200;background:var(--bg);padding:10px 0 8px}
.dir-search{display:flex;gap:8px;align-items:center;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;box-shadow:var(--shadow);transition:border-color .2s}
.dir-search:focus-within{border-color:var(--gold)}
.dir-search .si{font-size:16px;flex-shrink:0}
.dir-search input{flex:1;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:none}
.dir-search input::placeholder{color:var(--muted)}
.clear-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0 2px;display:none}
.clear-btn.show{display:block}

.cat-chips{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
.cat-chips::-webkit-scrollbar{display:none}
.cchip{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px;min-height:32px;font-family:'DM Sans',sans-serif}
.cchip:active{opacity:.7}
.cchip.active{color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.cchip .cd{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.results-lbl{font-size:11px;color:var(--muted);font-weight:600;padding:4px 2px 10px;text-transform:uppercase;letter-spacing:.6px}
.camp-grid{display:flex;flex-direction:column;gap:10px}

.camp-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .18s ease}
.camp-card.past{opacity:.55}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.cc-top{display:flex;align-items:stretch}
.cc-stripe{width:6px;flex-shrink:0}
.cc-body{flex:1;padding:13px 14px;min-width:0}
.cc-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px}
.cc-cat-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;color:#fff;margin-bottom:8px}
.cc-type{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:8px;margin-left:6px}
.cc-type.show{background:#CC000020;color:#CC0000}
.cc-type.pub{background:#D81B6020;color:#D81B60}
.past-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:#fff;background:#9E9E9E;padding:2px 8px;border-radius:8px;margin-left:6px}

.cc-info{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-top:8px}
.cc-info-row{display:flex;flex-direction:column;gap:1px}
.cc-info-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
.cc-info-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text)}
.cc-info-val.red{color:var(--red)}
.cc-info-val.orange{color:var(--orange)}
.cc-info-val.green{color:var(--green)}

.cc-bottom{padding:8px 14px;background:#FAFBFC;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.cc-status{font-size:11px;font-weight:600;color:var(--muted)}
.cc-lg-bar{display:flex;align-items:center;gap:6px}
.lg-dots{display:flex;gap:2px}
.lg-dot{width:8px;height:8px;border-radius:2px;background:var(--green)}
.lg-dot.empty{background:#E4E7EE}

.no-results{text-align:center;padding:40px 20px;color:var(--muted)}
.no-results .nr-icon{font-size:40px;margin-bottom:10px}
.no-results p{font-size:14px}

/* MONTH SELECTOR (shared) */
#month-selector{display:flex;gap:6px;overflow-x:auto;padding:10px 12px 6px;scrollbar-width:none;border-bottom:1px solid var(--border)}
#month-selector::-webkit-scrollbar{display:none}
.mon-btn{flex-shrink:0;padding:5px 13px;border-radius:16px;border:1.5px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.mon-btn:hover:not(.active){border-color:var(--gold);color:var(--text)}
.mon-btn.active{background:var(--brand);color:var(--gold);border-color:var(--brand)}
#month-header{padding:8px 16px 4px;font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px}
#month-grid{padding:8px 12px 20px;display:flex;flex-direction:column;gap:8px}
@media(min-width:600px){#month-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}}

/* Flashcard */
.fc{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);display:flex;align-items:stretch;animation:fadeUp .15s ease}
.fc.past{opacity:.55}
.fc-stripe{width:5px;flex-shrink:0}
.fc-body{flex:1;padding:11px 13px;display:flex;flex-direction:column;gap:4px}
.fc-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
.fc-dates{display:flex;gap:12px;flex-wrap:wrap;margin-top:2px}
.fc-date-item{display:flex;flex-direction:column;gap:1px}
.fc-date-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.fc-date-val{font-size:12px;font-weight:600;font-family:'DM Mono','Consolas',monospace}
.fc-date-val.red{color:var(--red)}
.fc-date-val.orange{color:var(--orange)}
.fc-type-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:600;padding:2px 8px;border-radius:8px;align-self:flex-start}
.fc-type-badge.show{background:#CC000015;color:var(--red)}
.fc-type-badge.pub{background:#D81B6015;color:#D81B60}

/* WEEKLY FOCUS */
.week-picker{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none}
.week-picker::-webkit-scrollbar{display:none}
.wp-btn{flex-shrink:0;padding:7px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;min-height:36px;display:flex;flex-direction:column;align-items:center;gap:2px}
.wp-btn .wp-date{font-size:12px;font-weight:600;color:var(--text)}
.wp-btn.active{background:var(--brand);border-color:var(--brand)}
.wp-btn.active .wp-date{color:#fff}
.wp-btn.now{border-color:var(--gold)}
.wp-btn:hover:not(.active){border-color:var(--gold);background:var(--gold-light)}
.week-cards{padding:8px 0 20px;display:flex;flex-direction:column;gap:6px}
.week-sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:10px 2px 4px;display:flex;align-items:center;gap:6px}
.wsl-show{color:var(--red)}
.wsl-dl{color:var(--orange)}
.wsl-pr{color:var(--green)}
.week-nav{display:flex;align-items:center;gap:8px;margin-top:12px}
.week-nav-btn{padding:8px 14px;border:1.5px solid var(--border);background:var(--surface);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;min-height:40px}
.week-nav-btn:hover{background:var(--gold-light);border-color:var(--gold)}
.week-nav-btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.week-nav-label{flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--text)}

/* Add / edit form */
.edit-form{margin:4px 0 24px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:none}
.edit-form.show{display:block}
.ef-hdr{padding:12px 14px 10px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.ef-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.ef-body input,.ef-body select{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface);outline:none;-webkit-appearance:none;transition:border-color .15s}
.ef-body input:focus,.ef-body select:focus{border-color:var(--gold)}
.ef-row{display:flex;gap:8px}
.ef-row>*{flex:1}
.ef-check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);cursor:pointer}
.ef-check input{width:auto}
.ef-btns{display:flex;gap:8px}
.ef-save{flex:1;background:var(--brand);color:var(--gold);border:none;border-radius:10px;padding:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.ef-cancel{padding:12px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer}

/* Edit-mode controls on campaign cards */
.cc-edit-actions{display:none;gap:6px;padding:8px 14px;border-top:1px solid var(--border);background:#FAFBFC}
body.editing .cc-edit-actions{display:flex}
.cc-edit-btn{flex:1;border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.cc-edit-btn.del{color:var(--red);border-color:#f0c4c4}
.add-btn{width:100%;background:var(--gold-light);border:1.5px dashed var(--gold);color:var(--orange);border-radius:12px;padding:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:12px;display:none}
body.editing .add-btn{display:block}

/* Save bar */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--brand);padding:12px 16px;display:none;align-items:center;gap:12px;z-index:400;box-shadow:0 -2px 16px rgba(0,0,0,.3)}
.save-bar.show{display:flex}
.save-bar span{flex:1;color:#fff;font-size:12px;font-weight:600}
.save-bar button{background:var(--gold);color:var(--brand);border:none;border-radius:9px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* PIN modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);padding:22px;max-width:320px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.modal h3{font-size:15px;margin-bottom:6px}
.modal p{font-size:12px;color:var(--muted);margin-bottom:14px}
.modal input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px;font-size:18px;text-align:center;letter-spacing:6px;font-family:'DM Mono',monospace;outline:none;margin-bottom:6px}
.modal input:focus{border-color:var(--gold)}
.modal .err-msg{font-size:11px;color:var(--red);min-height:15px;margin-bottom:8px}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;border:none;border-radius:10px;padding:11px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.modal-btns .ok{background:var(--brand);color:var(--gold)}
.modal-btns .cancel{background:var(--bg);color:var(--muted)}
</style>
</head>

<script>
// ══════════════════════════════════════════════════════════════
// EC SALES / EVENTS CALENDAR 2026 — app logic
// Data lives in Azure Table Storage; loaded via /api on startup.
// ══════════════════════════════════════════════════════════════

// Category config (kept in one place)
const CAT_COLOR = {quincea:'#E91E8C',feria:'#1565C0',breakfast:'#0D47A1',ssn_expo:'#0288D1',special:'#00695C',vivela:'#D81B60',soccer:'#1B5E20',supps:'#9575CD'};
const CAT_NAME  = {quincea:'Quinceañera Expos',feria:'Feria de Trabajo',breakfast:'Tu Socio Breakfast',ssn_expo:'SSdN Expo',special:'Special Events',vivela:'Vívela',soccer:'EC Soccer Inserts',supps:'Supplements'};
const CAT_ORDER = ['quincea','feria','breakfast','ssn_expo','special','vivela','soccer','supps'];

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MO_SHORT    = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const YEAR = 2026;

// State
let CAMPS = [];      // EC campaigns from Azure
let activeCat = 'all', searchQ = '', selectedMonth = new Date().getMonth();
let curWeek = 0;
let editing = false, editPin = null, dirty = false;
let campEditId = null;

// ── DATE HELPERS ──────────────────────────────────────────────
function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function parseDate(iso) { return iso ? new Date(iso + 'T12:00:00') : null; }
function isPast(iso) { const d = parseDate(iso); return d ? d < today() : false; }
function fmtDate(iso) { const d = parseDate(iso); return d ? MO_SHORT[d.getMonth()] + ' ' + String(d.getDate()).padStart(2,'0') : 'TBD'; }
// prospecting start = event date minus lg weeks
function prospectStart(iso, lg) {
  const d = parseDate(iso); if (!d) return null;
  const s = new Date(d); s.setDate(s.getDate() - (lg||4)*7); return s;
}

// ── API ───────────────────────────────────────────────────────
async function apiGet(path) {
  const r = await fetch('/api/' + path);
  if (!r.ok) throw new Error(path + ' → ' + r.status);
  return r.json();
}
async function apiSave(path, data) {
  const r = await fetch('/api/' + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-edit-pin': editPin || '' },
    body: JSON.stringify(data)
  });
  if (r.status === 401) throw new Error('PIN rejected');
  if (!r.ok) throw new Error(path + ' → ' + r.status);
  return r.json();
}

function setSync(msg, cls) {
  const el = document.getElementById('sync');
  el.textContent = msg;
  el.className = 'sync' + (cls ? ' ' + cls : '');
}

async function loadAll() {
  setSync('Loading from cloud…');
  curWeek = currentWeekIndex();
  try {
    CAMPS = await apiGet('getCampaigns');
    setSync('Up to date', 'ok');
    setTimeout(() => setSync(''), 1500);
  } catch (e) {
    setSync('Could not reach the cloud — showing nothing. Refresh to retry.', 'err');
    CAMPS = [];
  }
  renderCatChips();
  renderDir();
  buildWeekPicker();
  buildMonthSelector();
  renderMonth();
  buildCatSelect();
}

// ── TAB SWITCH ────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ── CAMPAIGN DIRECTORY ────────────────────────────────────────
function getColor(cat) { return CAT_COLOR[cat] || '#555'; }

function renderCatChips() {
  const cats = CAT_ORDER.filter(c => CAMPS.some(x => x.cat === c));
  const chips = ['<button class="cchip all active" onclick="setCat(\'all\')">All</button>'];
  cats.forEach(c => {
    chips.push('<button class="cchip" data-cat="' + c + '" onclick="setCat(\'' + c + '\')">' +
      '<span class="cd" style="background:' + getColor(c) + '"></span>' + (CAT_NAME[c] || c) + '</button>');
  });
  document.getElementById('catChips').innerHTML = chips.join('');
}

function buildCampCard(c) {
  const color = getColor(c.cat);
  const past = isPast(c.event);
  const typeClass = c.print ? 'pub' : 'show';
  const typeLabel = c.print ? 'PUBLICATION' : 'SHOW';
  const ps = prospectStart(c.event, c.lg);
  const psLabel = ps ? MO_SHORT[ps.getMonth()] + ' ' + String(ps.getDate()).padStart(2,'0') : '—';

  const total = Math.min(c.lg || 4, 10);
  const dots = Array.from({length:10}, (_,i) =>
    '<div class="lg-dot' + (i < total ? '' : ' empty') + '"></div>').join('');

  const dlRow = c.dl ? '<div class="cc-info-row"><span class="cc-info-lbl">Ad Deadline</span><span class="cc-info-val orange">' + fmtDate(c.dl) + '</span></div>' : '';
  const pastBadge = past ? '<span class="past-badge">✓ PAST</span>' : '';

  return '<div class="camp-card' + (past ? ' past' : '') + '" data-cat="' + c.cat + '">' +
    '<div class="cc-top">' +
      '<div class="cc-stripe" style="background:' + color + '"></div>' +
      '<div class="cc-body">' +
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap">' +
          '<div>' +
            '<div class="cc-name">' + c.label + '</div>' +
            '<div>' +
              '<span class="cc-cat-badge" style="background:' + color + '">' + (CAT_NAME[c.cat] || c.cat) + '</span>' +
              '<span class="cc-type ' + typeClass + '">' + typeLabel + '</span>' +
              pastBadge +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="cc-info">' +
          '<div class="cc-info-row"><span class="cc-info-lbl">' + (c.print ? 'Publication' : 'Event Date') + '</span><span class="cc-info-val red">' + fmtDate(c.event) + '</span></div>' +
          dlRow +
          '<div class="cc-info-row"><span class="cc-info-lbl">Prospect From</span><span class="cc-info-val green">' + psLabel + '</span></div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="cc-bottom">' +
      '<div class="cc-status">Prospecting window: <strong>' + (c.lg || 4) + ' weeks</strong></div>' +
      '<div class="cc-lg-bar"><div class="lg-dots">' + dots + '</div></div>' +
    '</div>' +
    '<div class="cc-edit-actions">' +
      '<button class="cc-edit-btn" onclick="editCamp(\'' + c.id + '\')">✏️ Edit</button>' +
      '<button class="cc-edit-btn del" onclick="delCamp(\'' + c.id + '\')">🗑 Delete</button>' +
    '</div>' +
  '</div>';
}

function renderDir() {
  const q = searchQ.toLowerCase();
  let filtered = CAMPS.filter(c => {
    const catOk = activeCat === 'all' || c.cat === activeCat;
    const searchOk = !q || c.label.toLowerCase().includes(q) ||
      (CAT_NAME[c.cat] || '').toLowerCase().includes(q) ||
      fmtDate(c.event).toLowerCase().includes(q);
    return catOk && searchOk;
  });
  // sort chronologically by event date
  filtered.sort((a,b) => {
    const da = parseDate(a.event), db = parseDate(b.event);
    if (!da && !db) return 0; if (!da) return 1; if (!db) return -1;
    return da - db;
  });

  const grid = document.getElementById('campGrid');
  const lbl = document.getElementById('resultsLbl');

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results"><div class="nr-icon">🔍</div><p>No campaigns found.</p></div>';
    lbl.textContent = 'No results';
    return;
  }
  grid.innerHTML = filtered.map(buildCampCard).join('');
  lbl.textContent = filtered.length + ' campaign' + (filtered.length !== 1 ? 's' : '') +
    (activeCat !== 'all' ? ' · ' + CAT_NAME[activeCat] : '') + (q ? ' · "' + searchQ + '"' : '');
}

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cchip').forEach(c => c.classList.remove('active'));
  if (cat === 'all') document.querySelector('.cchip.all').classList.add('active');
  else document.querySelector('.cchip[data-cat="' + cat + '"]').classList.add('active');
  renderDir();
}
function searchDir(val) {
  searchQ = val;
  document.getElementById('clearBtn').classList.toggle('show', val.length > 0);
  renderDir();
}
function clearSearch() {
  searchQ = '';
  document.getElementById('dirSearch').value = '';
  document.getElementById('clearBtn').classList.remove('show');
  renderDir();
}

// ── MONTHLY VIEW ──────────────────────────────────────────────
function buildMonthSelector() {
  document.getElementById('month-selector').innerHTML = MONTH_NAMES.map((m,i) =>
    '<button class="mon-btn' + (i === selectedMonth ? ' active' : '') + '" data-mon="' + i + '" onclick="renderMonth(' + i + ')">' + MO_SHORT[i] + '</button>'
  ).join('');
}
function buildFlashCard(c) {
  const color = getColor(c.cat);
  const past = isPast(c.event);
  const typeClass = c.print ? 'pub' : 'show';
  const dlItem = c.dl ? '<div class="fc-date-item"><span class="fc-date-lbl">Deadline</span><span class="fc-date-val orange">' + fmtDate(c.dl) + '</span></div>' : '';
  return '<div class="fc' + (past ? ' past' : '') + '">' +
    '<div class="fc-stripe" style="background:' + color + '"></div>' +
    '<div class="fc-body">' +
      '<div class="fc-name">' + c.label + (past ? ' <span class="past-badge">✓ PAST</span>' : '') + '</div>' +
      '<span class="fc-type-badge ' + typeClass + '">' + (c.print ? 'PUBLICATION' : 'SHOW') + '</span>' +
      '<div class="fc-dates">' +
        '<div class="fc-date-item"><span class="fc-date-lbl">' + (c.print ? 'Pub' : 'Event') + '</span><span class="fc-date-val red">' + fmtDate(c.event) + '</span></div>' +
        dlItem +
      '</div>' +
    '</div></div>';
}
function renderMonth(mon) {
  if (mon !== undefined) selectedMonth = mon;
  buildMonthSelector();
  const events = CAMPS.filter(c => {
    const ev = parseDate(c.event), dl = parseDate(c.dl);
    const evIn = ev && ev.getMonth() === selectedMonth && ev.getFullYear() === YEAR;
    const dlIn = dl && dl.getMonth() === selectedMonth && dl.getFullYear() === YEAR;
    return evIn || dlIn;
  }).sort((a,b) => parseDate(a.event) - parseDate(b.event));

  document.getElementById('month-header').innerHTML =
    MONTH_NAMES[selectedMonth] + ' 2026 <span style="color:var(--muted);font-weight:400;font-size:10px">— ' + events.length + ' event' + (events.length !== 1 ? 's' : '') + '</span>';
  document.getElementById('month-grid').innerHTML = events.length
    ? events.map(buildFlashCard).join('')
    : '<div class="no-results"><div class="nr-icon">🗓️</div><p>Nothing in ' + MONTH_NAMES[selectedMonth] + '.</p></div>';
}

// ── WEEKLY FOCUS ──────────────────────────────────────────────
// Build Mondays across the year, auto-select the current week.
function mondaysOfYear() {
  const list = [];
  let d = new Date(YEAR, 0, 1);
  // move to first Monday
  while (d.getDay() !== 1) d.setDate(d.getDate() + 1);
  while (d.getFullYear() === YEAR) {
    list.push(new Date(d));
    d.setDate(d.getDate() + 7);
  }
  return list;
}
const MONDAYS = mondaysOfYear();
function currentWeekIndex() {
  const t = today();
  let idx = 0;
  for (let i = 0; i < MONDAYS.length; i++) {
    const start = MONDAYS[i], end = new Date(start); end.setDate(end.getDate() + 6);
    if (t >= start && t <= end) return i;
    if (t > end) idx = i;
  }
  return idx;
}
function buildWeekPicker() {
  const nowIdx = currentWeekIndex();
  document.getElementById('weekPicker').innerHTML = MONDAYS.map((m,i) =>
    '<button class="wp-btn' + (i === curWeek ? ' active' : '') + (i === nowIdx ? ' now' : '') + '" onclick="selWeek(' + i + ')">' +
      '<span class="wp-date">' + MO_SHORT[m.getMonth()] + ' ' + m.getDate() + '</span></button>'
  ).join('');
  const activeBtn = document.querySelector('.wp-btn.active');
  if (activeBtn) activeBtn.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
  renderWeek();
}
function selWeek(i) { curWeek = i; buildWeekPicker(); }
function wNav(dir) { const n = curWeek + dir; if (n >= 0 && n < MONDAYS.length) { curWeek = n; buildWeekPicker(); } }
function renderWeek() {
  const start = MONDAYS[curWeek], end = new Date(start); end.setDate(end.getDate() + 6);
  const inWeek = (iso) => { const d = parseDate(iso); return d && d >= start && d <= end; };

  document.getElementById('wNavLabel').textContent =
    'Week of ' + MO_SHORT[start.getMonth()] + ' ' + start.getDate();

  const shows = CAMPS.filter(c => inWeek(c.event));
  const deadlines = CAMPS.filter(c => inWeek(c.dl));
  const prospecting = CAMPS.filter(c => {
    const ps = prospectStart(c.event, c.lg);
    return ps && ps >= start && ps <= end;
  });

  let html = '';
  const line = (c) => '<div class="fc"><div class="fc-stripe" style="background:' + getColor(c.cat) + '"></div><div class="fc-body"><div class="fc-name">' + c.label + '</div><div class="fc-dates"><div class="fc-date-item"><span class="fc-date-lbl">' + (c.print ? 'Pub' : 'Event') + '</span><span class="fc-date-val red">' + fmtDate(c.event) + '</span></div>' + (c.dl ? '<div class="fc-date-item"><span class="fc-date-lbl">Deadline</span><span class="fc-date-val orange">' + fmtDate(c.dl) + '</span></div>' : '') + '</div></div></div>';

  if (shows.length) html += '<div class="week-sec-lbl wsl-show">★ Shows & Publications <span>' + shows.length + '</span></div>' + shows.map(line).join('');
  if (deadlines.length) html += '<div class="week-sec-lbl wsl-dl">▼ Ad Deadlines <span>' + deadlines.length + '</span></div>' + deadlines.map(line).join('');
  if (prospecting.length) html += '<div class="week-sec-lbl wsl-pr">✖ Start Prospecting <span>' + prospecting.length + '</span></div>' + prospecting.map(line).join('');

  if (!html) html = '<div class="no-results"><div class="nr-icon">📅</div><p>Nothing scheduled this week.</p></div>';
  document.getElementById('weekCard').innerHTML = html;
}

// ── EDIT MODE ─────────────────────────────────────────────────
function toggleEdit() {
  if (editing) { exitEdit(); return; }
  openPinModal();
}
function openPinModal() {
  document.getElementById('pinModal').classList.add('show');
  document.getElementById('pinErr').textContent = '';
  document.getElementById('pinInput').value = '';
  setTimeout(() => document.getElementById('pinInput').focus(), 100);
}
function closePinModal() { document.getElementById('pinModal').classList.remove('show'); }
function submitPin() {
  const val = document.getElementById('pinInput').value.trim();
  if (!val) { document.getElementById('pinErr').textContent = 'Enter the PIN.'; return; }
  // We verify the PIN lazily on first save; unlock UI now.
  editPin = val;
  editing = true;
  document.body.classList.add('editing');
  document.getElementById('editBtn').classList.add('on');
  document.getElementById('editBtnLbl').textContent = 'Done';
  document.querySelector('#editBtn span').textContent = '🔓';
  closePinModal();
}
function exitEdit() {
  if (dirty && !confirm('You have unsaved changes. Leave edit mode and discard them?')) return;
  editing = false; editPin = null; dirty = false;
  document.body.classList.remove('editing');
  document.getElementById('editBtn').classList.remove('on');
  document.getElementById('editBtnLbl').textContent = 'Edit';
  document.querySelector('#editBtn span').textContent = '🔒';
  document.getElementById('saveBar').classList.remove('show');
  closeCampForm();
}
function markDirty() {
  dirty = true;
  document.getElementById('saveBar').classList.add('show');
}

// Campaign form
function buildCatSelect() {
  document.getElementById('cf-cat').innerHTML = CAT_ORDER.map(c =>
    '<option value="' + c + '">' + (CAT_NAME[c] || c) + '</option>').join('');
}
function openCampForm() {
  campEditId = null;
  document.getElementById('camp-form-hdr').textContent = '➕ Add Campaign';
  document.getElementById('cf-label').value = '';
  document.getElementById('cf-cat').value = 'vivela';
  document.getElementById('cf-lg').value = 4;
  document.getElementById('cf-event').value = '';
  document.getElementById('cf-dl').value = '';
  document.getElementById('cf-print').checked = false;
  document.getElementById('camp-form').classList.add('show');
  document.getElementById('camp-form').scrollIntoView({behavior:'smooth',block:'start'});
}
function closeCampForm() { document.getElementById('camp-form').classList.remove('show'); }
function editCamp(id) {
  const c = CAMPS.find(x => x.id === id); if (!c) return;
  campEditId = id;
  document.getElementById('camp-form-hdr').textContent = '✏️ Edit Campaign';
  document.getElementById('cf-label').value = c.label;
  document.getElementById('cf-cat').value = c.cat;
  document.getElementById('cf-lg').value = c.lg || 4;
  document.getElementById('cf-event').value = c.event || '';
  document.getElementById('cf-dl').value = c.dl || '';
  document.getElementById('cf-print').checked = !!c.print;
  document.getElementById('camp-form').classList.add('show');
  document.getElementById('camp-form').scrollIntoView({behavior:'smooth',block:'start'});
}
document.getElementById('cf-save').addEventListener('click', () => {
  const label = document.getElementById('cf-label').value.trim();
  if (!label) { document.getElementById('cf-label').focus(); return; }
  const obj = {
    label,
    cat: document.getElementById('cf-cat').value,
    lg: parseInt(document.getElementById('cf-lg').value) || 4,
    event: document.getElementById('cf-event').value,
    dl: document.getElementById('cf-dl').value || null,
    print: document.getElementById('cf-print').checked
  };
  if (campEditId) {
    const i = CAMPS.findIndex(x => x.id === campEditId);
    CAMPS[i] = Object.assign({id: campEditId}, obj);
  } else {
    obj.id = 'c-' + Date.now();
    CAMPS.push(obj);
  }
  closeCampForm(); markDirty();
  renderCatChips(); renderDir(); renderMonth(); buildWeekPicker();
});
function delCamp(id) {
  if (!confirm('Delete this campaign?')) return;
  CAMPS = CAMPS.filter(x => x.id !== id);
  markDirty(); renderCatChips(); renderDir(); renderMonth(); buildWeekPicker();
}


// ── SAVE ──────────────────────────────────────────────────────
async function saveAll() {
  const bar = document.getElementById('saveBar');
  document.getElementById('saveBarMsg').textContent = 'Saving…';
  try {
    await apiSave('saveCampaigns', CAMPS);
    dirty = false;
    bar.classList.remove('show');
    setSync('Saved — everyone sees this now', 'ok');
    setTimeout(() => setSync(''), 2500);
  } catch (e) {
    if (String(e.message).includes('PIN')) {
      document.getElementById('saveBarMsg').textContent = 'PIN was wrong — exit and re-enter it.';
    } else {
      document.getElementById('saveBarMsg').textContent = 'Save failed. Try again.';
    }
  }
}

// PIN modal: Enter key submits
document.getElementById('pinInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitPin(); });

// ── INIT ──────────────────────────────────────────────────────
loadAll();

</script>
